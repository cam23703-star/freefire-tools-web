<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Free Fire Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #8b5cf6;
            --dark: #0b0f14;
            --dark-card: #161a1f;
            --dark-border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: var(--dark);
            color: var(--text);
            margin: 0;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: var(--dark-card);
            border-right: 1px solid var(--dark-border);
            padding: 2rem 1rem;
            position: fixed;
        }

        .sidebar h2 { color: var(--primary); margin-bottom: 3rem; text-align: center; }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 12px 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            transition: 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(139, 92, 246, 0.1);
            color: var(--primary);
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            padding: 2rem;
            width: 100%;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--dark-card);
            padding: 1.5rem;
            border-radius: 15px;
            border: 1px solid var(--dark-border);
        }

        .stat-card h3 { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        .stat-card p { font-size: 1.8rem; font-weight: bold; color: var(--primary); margin: 0; }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--dark-card);
            border-radius: 15px;
            overflow: hidden;
        }

        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--dark-border); }
        th { background: rgba(255,255,255,0.02); color: var(--text-muted); font-weight: 500; }

        .btn {
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .btn-edit { background: rgba(139, 92, 246, 0.2); color: var(--primary); }
        .btn-delete { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .btn-add { background: var(--primary); color: white; padding: 10px 20px; }

        .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .badge-pro { background: #8b5cf6; color: white; }
        .badge-free { background: #475569; color: white; }

        /* Modal / Form */
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            background: #1e293b;
            border: 1px solid var(--dark-border);
            border-radius: 8px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Admin Panel</h2>
        <a href="#" class="nav-link active" onclick="showTab('users')"><i class="fas fa-users"></i> Người dùng</a>
        <a href="#" class="nav-link" onclick="showTab('keys')"><i class="fas fa-key"></i> Quản lý Key</a>
        <a href="#" class="nav-link" style="margin-top: auto; color: #ef4444;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
    </div>

    <div class="main-content">
        <div id="users-tab" class="tab-content active">
            <h1 style="margin-bottom: 2rem;">Quản lý Người dùng</h1>
            <div class="stats-grid" id="user-stats"></div>
            
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Trạng thái</th>
                        <th>Sử dụng (Ban7/Spam)</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="users-list"></tbody>
            </table>
        </div>

        <div id="keys-tab" class="tab-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>Quản lý Key</h1>
                <button class="btn btn-add" onclick="openCreateKeyModal()"><i class="fas fa-plus"></i> Tạo Key mới</button>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>Mã Key</th>
                        <th>Tính năng</th>
                        <th>Thời hạn</th>
                        <th>Trạng thái</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="keys-list"></tbody>
            </table>
        </div>
    </div>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(tabId + '-tab').classList.add('active');
            event.currentTarget.classList.add('active');
            
            if(tabId === 'users') loadUsers();
            if(tabId === 'keys') loadKeys();
        }

        async function loadUsers() {
            const res = await fetch('/api/admin/get_users');
            const data = await res.json();
            if (data.success) {
                const list = document.getElementById('users-list');
                list.innerHTML = '';
                
                let total = 0, proCount = 0;
                
                for (const username in data.users) {
                    total++;
                    const user = data.users[username];
                    const usage = data.usages[username] || {ban7: 0, spam_log: 0, is_pro: false};
                    const isPro = user.is_pro || usage.is_pro;
                    if(isPro) proCount++;
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${username}</td>
                        <td>${user.email}</td>
                        <td><span class="badge ${isPro ? 'badge-pro' : 'badge-free'}">${isPro ? 'PRO' : 'FREE'}</span></td>
                        <td>${usage.ban7 || 0} / ${usage.spam_log || 0}</td>
                        <td>
                            <button class="btn btn-edit" onclick="editUser('${username}', '${user.email}', ${isPro})"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-delete" onclick="deleteUser('${username}')"><i class="fas fa-trash"></i></button>
                        </td>
                    `;
                    list.appendChild(tr);
                }
                
                document.getElementById('user-stats').innerHTML = `
                    <div class="stat-card"><h3>Tổng User</h3><p>${total}</p></div>
                    <div class="stat-card"><h3>User PRO</h3><p>${proCount}</p></div>
                    <div class="stat-card"><h3>User FREE</h3><p>${total - proCount}</p></div>
                `;
            }
        }

        async function loadKeys() {
            const res = await fetch('/api/admin/get_keys');
            const data = await res.json();
            if (data.success) {
                const list = document.getElementById('keys-list');
                list.innerHTML = '';
                
                if (data.keys) {
                    for (const code in data.keys) {
                        const key = data.keys[code];
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><code>${code}</code></td>
                            <td>${key.tool_name === 'all' ? 'Tất cả' : key.tool_name}</td>
                            <td>${key.is_lifetime ? 'Vĩnh viễn' : key.expiry}</td>
                            <td>${key.is_used ? '<span style="color: #ef4444">Đã dùng (' + key.used_by + ')</span>' : '<span style="color: #22c55e">Chưa dùng</span>'}</td>
                            <td>
                                <button class="btn btn-edit" onclick="editKey('${code}', '${key.expiry}')"><i class="fas fa-clock"></i></button>
                                <button class="btn btn-delete" onclick="deleteKey('${code}')"><i class="fas fa-trash"></i></button>
                            </td>
                        `;
                        list.appendChild(tr);
                    }
                }
            }
        }

        async function editUser(username, email, isPro) {
            const { value: formValues } = await Swal.fire({
                title: 'Chỉnh sửa User: ' + username,
                html: `
                    <div class="form-group">
                        <label>Email</label>
                        <input id="swal-email" class="swal2-input" value="${email}">
                    </div>
                    <div class="form-group">
                        <label>Đổi mật khẩu (để trống nếu không đổi)</label>
                        <input id="swal-pass" type="password" class="swal2-input" placeholder="Mật khẩu mới">
                    </div>
                    <div class="form-group">
                        <label>Gói tài khoản</label>
                        <select id="swal-pro" class="swal2-input">
                            <option value="false" ${!isPro ? 'selected' : ''}>FREE</option>
                            <option value="true" ${isPro ? 'selected' : ''}>PRO</option>
                        </select>
                    </div>
                `,
                focusConfirm: false,
                preConfirm: () => {
                    return {
                        email: document.getElementById('swal-email').value,
                        password: document.getElementById('swal-pass').value,
                        is_pro: document.getElementById('swal-pro').value === 'true'
                    }
                }
            });

            if (formValues) {
                const res = await fetch('/api/admin/update_user', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: username,
                        new_data: { email: formValues.email, is_pro: formValues.is_pro },
                        new_password: formValues.password || null
                    })
                });
                const result = await res.json();
                if(result.success) {
                    Swal.fire('Thành công', result.message, 'success');
                    loadUsers();
                }
            }
        }

        async function deleteUser(username) {
            if (confirm('Xác nhận xóa người dùng ' + username + '?')) {
                const res = await fetch('/api/admin/delete_user', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: username})
                });
                const result = await res.json();
                if(result.success) {
                    Swal.fire('Đã xóa', result.message, 'success');
                    loadUsers();
                }
            }
        }

        async function openCreateKeyModal() {
            const { value: formValues } = await Swal.fire({
                title: 'Tạo Key mới',
                html: `
                    <div class="form-group">
                        <label>Áp dụng cho tính năng</label>
                        <select id="key-tool" class="swal2-input">
                            <option value="ban7">Ban 7 Ngày</option>
                            <option value="spam_log">Spam Log</option>
                            <option value="all">Tất cả tính năng</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Thời hạn</label>
                        <select id="key-type" class="swal2-input" onchange="document.getElementById('key-expiry-wrap').style.display = this.value === 'temp' ? 'block' : 'none'">
                            <option value="life">Vĩnh viễn (Lifetime)</option>
                            <option value="temp">Có thời hạn</option>
                        </select>
                    </div>
                    <div id="key-expiry-wrap" style="display: none">
                        <div class="form-group">
                            <label>Ngày hết hạn (YYYY-MM-DD HH:MM:SS)</label>
                            <input id="key-expiry" class="swal2-input" placeholder="2026-12-31 23:59:59">
                        </div>
                    </div>
                `,
                preConfirm: () => {
                    return {
                        tool_name: document.getElementById('key-tool').value,
                        is_lifetime: document.getElementById('key-type').value === 'life',
                        expiry: document.getElementById('key-expiry').value
                    }
                }
            });

            if (formValues) {
                const res = await fetch('/api/admin/create_key', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formValues)
                });
                const result = await res.json();
                if(result.success) {
                    Swal.fire('Đã tạo Key', result.key, 'success');
                    loadKeys();
                }
            }
        }

        async function deleteKey(code) {
            if (confirm('Xóa key ' + code + '?')) {
                const res = await fetch('/api/admin/delete_key', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({key_code: code})
                });
                const result = await res.json();
                if(result.success) {
                    Swal.fire('Đã xóa', result.message, 'success');
                    loadKeys();
                }
            }
        }

        async function logout() {
            window.location.href = '/admin/login';
        }

        loadUsers();
    </script>
</body>
</html>
