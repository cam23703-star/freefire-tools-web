<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Free Fire Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --primary-light: #a78bfa;
            --primary-gradient: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 50%, #4c1d95 100%);
            --primary-glow: rgba(139, 92, 246, 0.3);
            --dark: #070a0e;
            --dark-card: rgba(16, 18, 27, 0.85);
            --dark-border: rgba(255, 255, 255, 0.06);
            --text: #e8edf5;
            --text-muted: #8892a0;
            --success: #10b981;
            --danger: #ef4444;
            --radius: 24px;
            --radius-sm: 14px;
            --shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            --shadow-glow: 0 0 80px rgba(139, 92, 246, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: var(--dark);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(139, 92, 246, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 0%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
            z-index: 0;
        }

        /* Animated Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: 0;
            animation: floatOrb 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(139, 92, 246, 0.15);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: rgba(59, 130, 246, 0.1);
            bottom: -50px;
            left: -50px;
            animation-delay: -7s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: rgba(236, 72, 153, 0.08);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -30px) scale(1.1); }
            50% { transform: translate(-20px, 40px) scale(0.9); }
            75% { transform: translate(30px, -20px) scale(1.05); }
        }

        /* Grid Pattern */
        .grid-pattern {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.5;
        }

        /* ==================== LOGIN CARD ==================== */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-card {
            background: var(--dark-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 2.8rem 2.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--dark-border);
            box-shadow: var(--shadow), var(--shadow-glow);
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary-gradient);
            opacity: 0.6;
        }

        /* Shine Effect */
        .login-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.03) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ==================== HEADER ==================== */
        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
            z-index: 1;
        }

        .login-header .brand-icon {
            width: 72px;
            height: 72px;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 8px 32px var(--primary-glow);
            position: relative;
            transition: all 0.4s ease;
        }

        .login-header .brand-icon:hover {
            transform: scale(1.05) rotate(-5deg);
            box-shadow: 0 12px 48px var(--primary-glow);
        }

        .login-header .brand-icon i {
            font-size: 2rem;
            color: white;
        }

        .login-header .brand-icon .pulse-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 2px solid rgba(139, 92, 246, 0.2);
            animation: pulseRing 2s ease-in-out infinite;
        }

        @keyframes pulseRing {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.15); opacity: 0; }
        }

        .login-header h2 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }

        .login-header .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 400;
            margin-top: 0.4rem;
            letter-spacing: 0.3px;
        }

        .login-header .subtitle i {
            color: var(--primary);
            margin-right: 4px;
        }

        /* ==================== FORM ==================== */
        form {
            position: relative;
            z-index: 1;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .form-group .input-wrapper {
            position: relative;
            transition: all 0.3s ease;
        }

        .form-group .input-wrapper .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: all 0.3s ease;
            z-index: 2;
            pointer-events: none;
        }

        .form-group .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid var(--dark-border);
            border-radius: var(--radius-sm);
            color: var(--text);
            outline: none;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.15);
            font-weight: 300;
        }

        .form-group .input-wrapper input:focus {
            border-color: var(--primary);
            background: rgba(139, 92, 246, 0.05);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.08);
        }

        .form-group .input-wrapper input:focus + .input-icon,
        .form-group .input-wrapper input:focus ~ .input-icon {
            color: var(--primary-light);
        }

        .form-group .input-wrapper input:not(:placeholder-shown) {
            background: rgba(255, 255, 255, 0.04);
        }

        /* ==================== PASSWORD TOGGLE ==================== */
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px;
            transition: all 0.3s ease;
            z-index: 2;
            width: auto;
        }

        .password-toggle:hover {
            color: var(--primary-light);
        }

        /* ==================== OPTIONS ==================== */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1.2rem 0 1.5rem;
            font-size: 0.85rem;
        }

        .form-options .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-options .remember-me:hover {
            color: var(--text);
        }

        .form-options .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
            cursor: pointer;
            padding: 0;
            background: transparent;
            border: 1.5px solid var(--dark-border);
            border-radius: 4px;
        }

        .form-options .forgot-link {
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 0.8rem;
        }

        .form-options .forgot-link:hover {
            color: var(--primary-light);
        }

        /* ==================== BUTTON ==================== */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary-gradient);
            border: none;
            border-radius: var(--radius-sm);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: all 0.6s ease;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px var(--primary-glow);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login i {
            margin-right: 10px;
        }

        .btn-login.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .btn-login .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        .btn-login.loading .spinner {
            display: block;
        }

        .btn-login.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ==================== ERROR ==================== */
        .error {
            color: var(--danger);
            text-align: center;
            margin-bottom: 1.2rem;
            font-size: 0.85rem;
            padding: 10px 14px;
            background: rgba(239, 68, 68, 0.06);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(239, 68, 68, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: shake 0.5s ease;
        }

        .error i {
            font-size: 1rem;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* ==================== FOOTER ==================== */
        .login-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--dark-border);
            position: relative;
            z-index: 1;
        }

        .login-footer .brand {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.08);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .login-footer .brand i {
            color: var(--primary);
            margin: 0 4px;
            opacity: 0.3;
        }

        .login-footer .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 0.8rem;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            border: 1px solid var(--dark-border);
        }

        .login-footer .security-badge i {
            color: var(--success);
            font-size: 0.6rem;
        }

        /* ==================== VERSION ==================== */
        .version-badge {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 1;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.06);
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
                border-radius: 20px;
            }

            .login-header .brand-icon {
                width: 60px;
                height: 60px;
            }

            .login-header .brand-icon i {
                font-size: 1.6rem;
            }

            .login-header h2 {
                font-size: 1.5rem;
            }

            .form-options {
                flex-direction: column;
                gap: 0.8rem;
                align-items: flex-start;
            }

            .orb-1, .orb-2 {
                width: 200px;
                height: 200px;
            }

            .version-badge {
                display: none;
            }
        }

        @media (max-width: 360px) {
            .login-card {
                padding: 1.5rem 1rem;
            }

            .form-group .input-wrapper input {
                padding: 12px 14px 12px 38px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    
    <!-- Grid Pattern -->
    <div class="grid-pattern"></div>

    <!-- Version -->
    <div class="version-badge">v2.0.0 • Secure</div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <div class="brand-icon">
                    <span class="pulse-ring"></span>
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h2>Admin Panel</h2>
                <div class="subtitle">
                    <i class="fas fa-crown"></i> Free Fire Tools • Secure Access
                </div>
            </div>

            <!-- Error Message -->
            {% if error %}
            <div class="error" id="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <!-- Form -->
            <form method="POST" id="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i> Tên đăng nhập
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            placeholder="Nhập username của bạn"
                            required
                            autofocus
                            value="{{ request.form.username or '' }}"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Mật khẩu
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Nhập mật khẩu"
                            required
                        >
                        <button type="button" class="password-toggle" id="toggle-password" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember" id="remember" {% if request.form.remember %}checked{% endif %}>
                        <span>Ghi nhớ đăng nhập</span>
                    </label>
                    <a href="#" class="forgot-link" onclick="showForgotPassword()">
                        <i class="fas fa-key"></i> Quên mật khẩu?
                    </a>
                </div>

                <button type="submit" class="btn-login" id="login-btn">
                    <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Đăng nhập</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <div class="brand">
                    <i class="fas fa-shield-alt"></i> Secure Admin Access
                </div>
                <div class="security-badge">
                    <i class="fas fa-shield-check"></i>
                    <span>Kết nối an toàn</span>
                    <span style="color: var(--dark-border);">•</span>
                    <span>SSL Encrypted</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ PASSWORD TOGGLE ============
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // ============ LOADING STATE ============
        document.getElementById('login-form').addEventListener('submit', function(e) {
            const btn = document.getElementById('login-btn');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                e.preventDefault();
                Swal.fire({
                    title: '⚠️ Thông báo',
                    text: 'Vui lòng nhập đầy đủ username và mật khẩu',
                    icon: 'warning',
                    confirmButtonColor: '#8b5cf6',
                    background: 'var(--dark-card)',
                    color: 'var(--text)',
                    confirmButtonText: 'Đã hiểu'
                });
                return;
            }

            btn.classList.add('loading');
            btn.disabled = true;
        });

        // ============ FORGOT PASSWORD ============
        function showForgotPassword() {
            Swal.fire({
                title: '🔑 Quên mật khẩu?',
                html: `
                    <p style="color: var(--text-muted); margin-bottom: 1rem;">
                        Liên hệ với quản trị viên để đặt lại mật khẩu
                    </p>
                    <div style="text-align: left; background: rgba(255,255,255,0.02); padding: 1rem; border-radius: 12px; border: 1px solid var(--dark-border);">
                        <div style="display: flex; align-items: center; gap: 12px; color: var(--text-muted); font-size: 0.85rem;">
                            <i class="fas fa-envelope" style="color: var(--primary);"></i>
                            <span>Email hỗ trợ: <strong style="color: var(--text);">admin@freefire.tools</strong></span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 12px; color: var(--text-muted); font-size: 0.85rem; margin-top: 8px;">
                            <i class="fab fa-discord" style="color: #5865F2;"></i>
                            <span>Discord: <strong style="color: var(--text);">@freefire_support</strong></span>
                        </div>
                    </div>
                `,
                confirmButtonText: 'Đã hiểu',
                confirmButtonColor: '#8b5cf6',
                background: 'var(--dark-card)',
                color: 'var(--text)',
                customClass: {
                    popup: 'swal-dark'
                }
            });
        }

        // ============ KEYBOARD SHORTCUTS ============
        document.addEventListener('keydown', function(e) {
            // Ctrl + Shift + L for login
            if (e.ctrlKey && e.shiftKey && e.key === 'L') {
                e.preventDefault();
                document.getElementById('username').focus();
            }
            
            // Escape to clear error
            if (e.key === 'Escape') {
                const error = document.getElementById('error-message');
                if (error) {
                    error.style.opacity = '0';
                    setTimeout(() => { error.style.display = 'none'; }, 300);
                }
            }
        });

        // ============ AUTO FOCUS ON LOAD ============
        document.addEventListener('DOMContentLoaded', function() {
            const username = document.getElementById('username');
            if (!username.value) {
                username.focus();
            }
        });

        // ============ SMOOTH ERROR DISMISS ============
        document.addEventListener('DOMContentLoaded', function() {
            const error = document.getElementById('error-message');
            if (error) {
                setTimeout(() => {
                    error.style.transition = 'opacity 0.5s ease';
                    error.style.opacity = '1';
                }, 100);
                
                // Auto dismiss after 5 seconds
                setTimeout(() => {
                    error.style.opacity = '0';
                    setTimeout(() => { error.style.display = 'none'; }, 500);
                }, 5000);
            }
        });

        // ============ PREVENT MULTIPLE SUBMISSIONS ============
        let submitting = false;
        document.getElementById('login-form').addEventListener('submit', function(e) {
            if (submitting) {
                e.preventDefault();
                return;
            }
            submitting = true;
            setTimeout(() => { submitting = false; }, 3000);
        });
    </script>

    <style>
        /* SweetAlert2 Dark Theme Override */
        .swal2-popup.swal-dark {
            background: rgba(16, 18, 27, 0.95) !important;
            backdrop-filter: blur(20px) !important;
            border: 1px solid var(--dark-border) !important;
            border-radius: 20px !important;
        }

        .swal2-popup.swal-dark .swal2-title {
            color: var(--text) !important;
        }

        .swal2-popup.swal-dark .swal2-html-container {
            color: var(--text-muted) !important;
        }

        .swal2-popup.swal-dark .swal2-confirm {
            background: var(--primary-gradient) !important;
            box-shadow: 0 4px 20px var(--primary-glow) !important;
        }

        .swal2-popup.swal-dark .swal2-confirm:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 8px 32px var(--primary-glow) !important;
        }
    </style>
</body>
</html>
