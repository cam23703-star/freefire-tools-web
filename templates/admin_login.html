<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Free Fire Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8b5cf6;
            --dark: #0b0f14;
            --dark-card: rgba(16, 18, 27, 0.8);
            --text: #ffffff;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: var(--dark);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
        }

        .login-card {
            background: var(--dark-card);
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid rgba(139, 92, 246, 0.15);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6), 0 0 40px rgba(139, 92, 246, 0.05);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h2 {
            color: var(--primary);
            font-size: 1.5rem;
            margin: 0;
        }

        .login-header .subtitle {
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        .login-header .icon-wrapper {
            width: 60px;
            height: 60px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.8rem;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .login-header .icon-wrapper i {
            font-size: 1.8rem;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group .input-wrapper {
            position: relative;
        }

        .form-group .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.2);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            color: white;
            outline: none;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.08);
        }

        input::placeholder {
            color: rgba(255,255,255,0.2);
        }

        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button i {
            margin-right: 8px;
        }

        .error {
            color: #ef4444;
            text-align: center;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            padding: 8px;
            background: rgba(239, 68, 68, 0.08);
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.1);
        }

        .brand {
            text-align: center;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.1);
            margin-top: 1.5rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="icon-wrapper">
                <i class="fas fa-user-shield"></i>
            </div>
            <h2>Admin Panel</h2>
            <div class="subtitle">Free Fire Tools</div>
        </div>

        {% if error %}
            <div class="error">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="Nhập Username" required>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> Mật khẩu</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="Nhập mật khẩu" required>
                </div>
            </div>

            <button type="submit">
                <i class="fas fa-sign-in-alt"></i> Đăng nhập
            </button>
        </form>

        <div class="brand">
            <i class="fas fa-shield-alt"></i> Secure Admin Access Developer
        </div>
    </div>
</body>
</html>
